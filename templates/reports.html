<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reports - TB Detection AI</title>
    <link rel="stylesheet" href="/static/css/style.css?v=1.2">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
</head>

<body>
    <nav class="navbar">
        <div class="nav-brand">
            <div class="logo-box">
                <span class="logo-icon">🫁</span>
                <div class="logo-text">
                    <span class="brand-name">TB Detection AI</span>
                    <span class="brand-subtext">AI-Powered Clinical Decision Support</span>
                </div>
            </div>
        </div>

        <ul class="nav-links">
            <li><a href="/" onclick="window.location.href='/'; return true;">Dashboard</a></li>
            <li class="active"><a href="/reports" onclick="window.location.href='/reports'; return true;">Reports</a>
            </li>
            <li><a href="/recommendations"
                    onclick="window.location.href='/recommendations'; return true;">Recommendations</a></li>
            <li><a href="/about" onclick="window.location.href='/about'; return true;">About</a></li>
        </ul>

        <div class="nav-user">
            <span class="user-welcome">Welcome, {{ session['username'] }}</span>
            <a href="/logout" class="btn-signout">Sign Out</a>
        </div>
    </nav>

    <main class="dashboard-main">
        <div class="reports-container">
            <div class="workspace-card" style="padding: 40px; background: white; min-height: 600px;">
                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 40px;">
                    <h2 class="card-title" style="margin-bottom: 0;">Patient Reports</h2>
                    <button class="btn-export" id="export-btn">Export CSV</button>
                </div>

                <div class="table-wrapper">
                    <table class="reports-table">
                        <thead>
                            <tr>
                                <th>Date</th>
                                <th>Report ID</th>
                                <th>Prediction</th>
                                <th>Confidence</th>
                                <th>Risk Level</th>
                                <th>Action</th>
                            </tr>
                        </thead>
                        <tbody id="reports-body">
                            <!-- Reports will be loaded here -->
                            <tr>
                                <td colspan="6" style="text-align: center; padding: 40px; color: #64748b;">
                                    Loading reports...
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </main>

    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            const reportsBody = document.getElementById('reports-body');

            try {
                console.log("Fetching reports from /api/reports...");
                const response = await fetch('/api/reports');
                console.log("Response status:", response.status);
                const reports = await response.json();
                console.log("Reports received:", reports);

                if (reports.length === 0) {
                    reportsBody.innerHTML = `
                        <tr>
                            <td colspan="6" style="text-align: center; padding: 40px; color: #64748b;">
                                No reports found. Start an analysis on the Dashboard!
                            </td>
                        </tr>
                    `;
                    return;
                }

                reportsBody.innerHTML = reports.map(report => `
                    <tr>
                        <td style="color: #64748b;">${report.date}</td>
                        <td style="font-weight: 600;">${report.id}</td>
                        <td style="font-weight: 700; color: ${report.prediction === 'Tuberculosis' ? '#ef4444' : '#10b981'}">
                            ${report.prediction}
                        </td>
                        <td style="font-weight: 600;">${report.confidence}</td>
                        <td>
                            <span class="badge ${report.risk_level.toLowerCase().replace(' ', '-')}">
                                ${report.risk_level.split(' ')[0]}
                            </span>
                        </td>
                        <td>
                            <a href="/download_report/${report.id.replace('#', '%23')}" class="btn-download" style="text-decoration: none; display: inline-block;">Download</a>
                        </td>
                    </tr>
                `).join('');

                // Add Export Click Handler
                document.getElementById('export-btn').addEventListener('click', () => {
                    window.location.href = '/api/export_reports';
                });

            } catch (error) {
                console.error('Error loading reports:', error);
                reportsBody.innerHTML = '<tr><td colspan="6" style="text-align: center; color: #ef4444; padding: 20px;">Error loading reports</td></tr>';
            }
        });
    </script>
</body>

</html>
